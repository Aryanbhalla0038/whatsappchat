name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest
    
    - name: Test module imports
      run: |
        python -c "import sys; sys.path.insert(0, 'src'); from preprocessing import ChatPreprocessor; print('✓ preprocessing OK')"
        python -c "import sys; sys.path.insert(0, 'src'); from feature_engineering import FeatureEngineer; print('✓ feature_engineering OK')"
        python -c "import sys; sys.path.insert(0, 'src'); from analysis import ChatAnalyzer; print('✓ analysis OK')"
        python -c "import streamlit; print('✓ streamlit OK')"
