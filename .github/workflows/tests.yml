name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Download NLTK data
      run: |
        python -m nltk.downloader punkt stopwords
    
    - name: Test imports
      run: |
        python -c "from src.preprocessing import ChatPreprocessor; print('✓ preprocessing module OK')"
        python -c "from src.feature_engineering import FeatureEngineer; print('✓ feature_engineering module OK')"
        python -c "from src.analysis import ChatAnalyzer; print('✓ analysis module OK')"
        python -c "import streamlit; print('✓ Streamlit OK')"
